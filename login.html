<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>

<body>

<h2>Login Form</h2>

<form method="post">

    <table border="0">
        <tr>
            <td>Username:</td>
            <td>
                <input type="text" name="username" required>
            </td>
        </tr>

        <tr>
            <td>Password:</td>
            <td>
                <input type="password" name="password" required>
            </td>
        </tr>

        <tr>
            <td></td>
            <td>
                <input type="submit" value="Login">
                <input type="reset" value="Clear">
            </td>
        </tr>
    </table>

</form>

</body>
</html>
